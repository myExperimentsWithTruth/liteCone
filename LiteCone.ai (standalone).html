document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ont-weight:300;font-size:clamp(22px,2.8vw,34px);line-height:1.34;letter-spacing:-.01em;color:#F2F5F8;text-wrap:pretty;\">\n        Year on year our business grows 15–20%. I don't have to add 15–20% underwriters every year. From a million to two million customers, I might still not incur additional cost of underwriting. This is a scalable model for us.\n      <\u002Fblockquote>\n      <div style=\"margin-top:26px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.04em;color:rgba(232,236,242,.55);\">— Chief Underwriting Officer, top life carrier in live production<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ZERO TOUCH / INDUSTRY FIRST ============ -->\n  <section id=\"zerotouch\" data-screen-label=\"Zero-Touch processing\" style=\"background:#FBF9F4;padding:clamp(64px,8vw,112px) 32px;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accentDeep,#8F5A1C);margin-bottom:18px;\">Industry first<\u002Fdiv>\n          <h2 style=\"font-size:clamp(28px,3.4vw,44px);line-height:1.06;letter-spacing:-.02em;font-weight:600;\">Zero-Touch processing for FSI.<\u002Fh2>\n          <p style=\"margin-top:20px;font-size:17px;line-height:1.6;color:#525C69;\">Volumes grow. Queues grow. Decision fatigue grows. Operating costs grow. Every FSI runs on decisions at scale.<\u002Fp>\n          <p style=\"margin-top:14px;font-size:17px;line-height:1.6;color:#525C69;\">Straight-Through Processing clears the clean files at machine speed. Everything else falls out to manual and waits in a queue for a human.<\u002Fp>\n          <p style=\"margin-top:14px;font-size:17px;line-height:1.6;color:#0E1622;font-weight:500;\">LiteCone decisions those Non-STP cases too — autonomously, against your own policies, risk rules, and compliance frameworks. Zero-touch, even where it used to break.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"align-self:center;\">\n          <p style=\"font-family:'Newsreader',Georgia,serif;font-style:italic;font-weight:300;font-size:clamp(24px,2.8vw,32px);line-height:1.25;color:#0E1622;text-wrap:balance;\">Not faster.<br>A different speed entirely.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:54px;background:#0E1622;border-radius:14px;padding:clamp(28px,3vw,44px);display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;\">\n        <sc-for list=\"{{ metrics }}\" as=\"m\" hint-placeholder-count=\"4\">\n          <div style=\"padding:14px 20px;border-left:1px solid rgba(255,255,255,.1);\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:clamp(30px,3.4vw,42px);font-weight:500;color:var(--accent,#BE7A2E);letter-spacing:-.02em;\">{{ m.v }}<\u002Fdiv>\n            <div style=\"margin-top:8px;font-size:14px;line-height:1.4;color:rgba(232,236,242,.72);\">{{ m.l }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#8A93A0;\">*Numbers from a top life carrier in live production for over a year.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ HOW IT WORKS / JOURNEY + FUNNEL ============ -->\n  <section id=\"how\" data-screen-label=\"How it works\" style=\"background:#F1ECE2;padding:clamp(64px,8vw,112px) 32px;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <div style=\"max-width:60ch;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accentDeep,#8F5A1C);margin-bottom:18px;\">How we do it<\u002Fdiv>\n        <h2 style=\"font-size:clamp(26px,3vw,40px);line-height:1.08;letter-spacing:-.02em;font-weight:600;\">From intake to auto-decision — the journey.<\u002Fh2>\n        <p style=\"margin-top:16px;font-size:18px;line-height:1.55;color:#525C69;\">The case arrives in its native form. It leaves as a provable decision, cited line by line.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:44px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;\">\n        <sc-for list=\"{{ journey }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid rgba(14,22,34,.1);border-radius:10px;padding:24px;display:flex;flex-direction:column;gap:12px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent,#BE7A2E);letter-spacing:.06em;\">{{ s.n }}<\u002Fdiv>\n            <div style=\"font-size:16.5px;font-weight:600;color:#0E1622;\">{{ s.title }}<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.5;color:#5B6573;\">{{ s.body }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- funnel -->\n      <div style=\"margin-top:56px;background:#fff;border:1px solid rgba(14,22,34,.1);border-radius:14px;padding:clamp(28px,3.5vw,52px);\">\n        <div style=\"text-align:center;max-width:60ch;margin:0 auto 8px;\">\n          <h3 style=\"font-size:clamp(20px,2.2vw,27px);line-height:1.2;letter-spacing:-.01em;font-weight:600;\">The funnel narrows to a single, sharp point.<\u002Fh3>\n          <p style=\"margin-top:10px;font-size:15.5px;line-height:1.5;color:#5B6573;\">Autonomous, provable decisions. Only the highly complex, non-standard exceptions reach a human desk.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"margin-top:30px;display:flex;flex-direction:column;align-items:center;gap:7px;\">\n          <sc-for list=\"{{ funnel }}\" as=\"f\" hint-placeholder-count=\"5\">\n            <div style=\"width:{{ f.w }};max-width:780px;background:{{ f.bg }};color:{{ f.fg }};border:1px solid {{ f.border }};border-radius:7px;padding:15px 22px;display:flex;align-items:center;justify-content:space-between;gap:18px;transition:width .3s;\">\n              <div style=\"display:flex;align-items:center;gap:12px;min-width:0;\">\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;white-space:nowrap;\">{{ f.label }}<\u002Fspan>\n                <span style=\"font-size:13.5px;line-height:1.35;opacity:.82;\">{{ f.body }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ GOVERNANCE / FIVE BRAINS ============ -->\n  <section id=\"governance\" data-screen-label=\"Governance\" style=\"background:#0E1622;color:#EAEEF3;padding:clamp(60px,7vw,100px) 32px;\">\n    <div style=\"max-width:1240px;margin:0 auto;\">\n      <div style=\"max-width:64ch;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent,#BE7A2E);margin-bottom:18px;\">Compliant by design<\u002Fdiv>\n        <h2 style=\"font-size:clamp(26px,3vw,40px);line-height:1.1;letter-spacing:-.02em;font-weight:600;color:#F6F8FA;\">The audit trail is built into the decision — not retrofitted.<\u002Fh2>\n        <p style=\"margin-top:18px;font-size:17px;line-height:1.6;color:rgba(232,236,242,.72);\">Every output passes the Five Brains. Defensible to an auditor, a regulator, and your board — line by line.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;\">\n        <sc-for list=\"{{ brains }}\" as=\"b\" hint-placeholder-count=\"5\">\n          <div style=\"border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:22px 20px;background:rgba(255,255,255,.02);\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent,#BE7A2E);\">{{ b.n }}<\u002Fdiv>\n            <div style=\"margin-top:12px;font-size:16px;font-weight:600;color:#F2F5F8;\">{{ b.name }}<\u002Fdiv>\n            <div style=\"margin-top:7px;font-size:13.5px;line-height:1.45;color:rgba(232,236,242,.6);\">{{ b.body }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CLOSING CTA ============ -->\n  <section id=\"briefing\" data-screen-label=\"Closing CTA\" style=\"background:#FBF9F4;padding:clamp(72px,9vw,128px) 32px;\">\n    <div style=\"max-width:900px;margin:0 auto;text-align:center;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accentDeep,#8F5A1C);margin-bottom:20px;\">If your policy is defined<\u002Fdiv>\n      <h2 style=\"font-size:clamp(30px,4vw,54px);line-height:1.05;letter-spacing:-.025em;font-weight:600;text-wrap:balance;\">LiteCone can auto-decide it.<\u002Fh2>\n      <p style=\"margin-top:20px;font-size:18px;line-height:1.55;color:#525C69;max-width:54ch;margin-left:auto;margin-right:auto;\">Book a 45-minute briefing. We'll show you exactly what Near-Zero Human Touch looks like in your environment.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:36px;\">\n        <a href=\"#top\" style=\"font-size:15px;font-weight:500;color:#fff;background:#0E1622;padding:15px 28px;border-radius:5px;text-decoration:none;\" style-hover=\"background:var(--accentDeep,#8F5A1C);\">Book a briefing ↗<\u002Fa>\n        <a href=\"#how\" style=\"font-size:15px;font-weight:500;color:#0E1622;border:1px solid rgba(14,22,34,.25);padding:15px 28px;border-radius:5px;text-decoration:none;\" style-hover=\"border-color:#0E1622;\">See the platform<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:#0E1622;color:rgba(232,236,242,.6);padding:34px 32px;border-top:1px solid rgba(255,255,255,.08);\">\n    <div style=\"max-width:1240px;margin:0 auto;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"width:16px;height:16px;display:inline-block;background:var(--accent,#BE7A2E);clip-path:polygon(50% 0,100% 100%,0 100%);\"><\u002Fspan>\n        <span style=\"font-size:14px;color:#EAEEF3;font-weight:500;\">LiteCone.ai<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.04em;\">Auto-decisioning for Financial Services &amp; Insurance · Deployed in your cloud<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;bannerOption&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;best&quot;,&quot;defined&quot;,&quot;hundred&quot;,&quot;hands&quot;],&quot;default&quot;:&quot;best&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#BE7A2E&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accentDeep&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#8F5A1C&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const accent = this.props.accent || '#BE7A2E';\n    const accentDeep = this.props.accentDeep || '#8F5A1C';\n\n    const banners = {\n      best: {\n        eyebrow: 'For FSI · Auto-decisioning',\n        title: 'Turn any role in any financial services process into an AI coworker.',\n        sub: 'Compliant by design — every decision Auditable, Explainable, and Governed.'\n      },\n      defined: {\n        eyebrow: 'For FSI · Auto-decisioning',\n        title: 'If your policy is defined, LiteCone can auto-decide.',\n        sub: \"Book a 45-minute briefing. We'll show you exactly what Near-Zero Human Touch looks like in your FSI decisioning environment.\"\n      },\n      hundred: {\n        eyebrow: 'For FSI · Auto-decisioning',\n        title: 'Enable 100% auto-decisioning.',\n        sub: 'For any business process in Financial Services & Insurance, with LiteCone AI Coworkers. Insurance, banking, lending, capital markets — if your policy is defined, LiteCone can decide it, with an audit trail your regulator can validate.'\n      },\n      hands: {\n        eyebrow: 'For FSI · Auto-decisioning',\n        title: 'Hands-on for FSI consumers. Hands-free for the underwriters who decide.',\n        sub: 'Routine applications, policies, claims, loans, and risk assessments — auto-decided with LiteCone, with an audit trail your regulator can approve. All with Near-Zero Human Touch.'\n      }\n    };\n\n    const banner = banners[this.props.bannerOption] || banners.best;\n\n    return {\n      accent, accentDeep, banner,\n      heroChecks: ['Auditable', 'Zero bias', 'Hard grounded', 'Configurable oversight'],\n      proof: [\n        { stat: '1+ year', title: 'In live production', body: 'Not days. Not weeks. Not a pilot. Real FSI teams use LiteCone today.' },\n        { stat: 'FSI-wide', title: 'Proven across the industry', body: 'Auto-decisioning enabled for insurance, banking, lending, and capital markets.' },\n        { stat: 'MAS', title: 'Pathfinder validated', body: \"The Asian regulator's framework. Vouched by the customer, verified by the authority.\" },\n        { stat: 'Your cloud', title: 'Data privacy, fortified', body: 'Deployed in your own cloud account. Your data never leaves your environment.' }\n      ],\n      metrics: [\n        { v: '~8 min', l: 'Underwriting turnaround time' },\n        { v: '75–80%', l: 'Cases cleared with zero underwriter touch' },\n        { v: '−25%', l: 'Underwriting cost of issuance' },\n        { v: '24×7', l: 'Decisions made — incl. weekends & holidays' }\n      ],\n      journey: [\n        { n: '01', title: 'Intake', body: 'Any role, any process. The case arrives in its native form — no re-keying, no rip-and-replace.' },\n        { n: '02', title: 'Read & ground', body: 'LiteCone reads the file and grounds every fact against your policy and your data.' },\n        { n: '03', title: 'Decide', body: 'It decisions against your policies, risk rules, and compliance frameworks — the way your best underwriter would, the same way every time.' },\n        { n: '04', title: 'Audit trail', body: 'Every decision is cited, explainable, and logged. A trail your regulator can read and replay.' }\n      ],\n      funnel: [\n        { w: '100%', label: 'Intake', body: 'Every application, policy, claim, loan & risk assessment.', bg: '#0E1622', fg: '#EAEEF3', border: '#0E1622' },\n        { w: '82%', label: 'STP', body: 'Clean files cleared at machine speed.', bg: '#22303F', fg: '#EAEEF3', border: '#22303F' },\n        { w: '64%', label: 'Non-STP', body: 'Used to fall out to a manual queue.', bg: '#3A4A59', fg: '#EAEEF3', border: '#3A4A59' },\n        { w: '44%', label: 'LiteCone', body: 'Decisioned autonomously against your policy.', bg: accent, fg: '#0E1622', border: accentDeep },\n        { w: '22%', label: 'Human desk', body: 'Only complex, non-standard exceptions.', bg: '#FBF9F4', fg: '#0E1622', border: 'rgba(14,22,34,.2)' }\n      ],\n      brains: [\n        { n: '01', name: 'Auditable', body: 'The audit trail is the artifact, not a report. Glass box, decision lineage you can replay.' },\n        { n: '02', name: 'Creditable', body: 'Every decision cited to your underwriting manual. Defensible to an auditor, line by line.' },\n        { n: '03', name: 'Zero bias', body: 'Bias testing in the pipeline. The same input yields the same answer, every time.' },\n        { n: '04', name: 'Hard grounded', body: 'Grounded to your policy and data. No fabrication, no drift.' },\n        { n: '05', name: 'Configurable oversight', body: 'The dial is yours to set. Scale autonomy on the timeline your audit history supports.' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
